<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/whispers.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nacelle:wght@400;700&display=swap"
    />

    <!-- Meta tags for SEO -->
    <meta
      name="description"
      content="Whispers: Anonymous chat app for secure, candid conversations. Share thoughts, connect freely, and engage without judgment. Join now!"
    />
    <meta
      name="keywords"
      content="whispers, anonymous chat, secure chat app, private conversations, anonymous messaging, candid discussions, social anonymity, private chat rooms, confidential chat, online chat platform, secure messaging"
    />
    <meta name="author" content="Whispers Team" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta
      name="robots"
      content="max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <link rel="canonical" href="https://whisprs.fun/" />
    <meta name="theme-color" content="#111111" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="google-site-verification" content="YOUR_GOOGLE_SITE_VERIFICATION_CODE" /> <!-- Replace with your Google Search Console verification code -->
    <meta name="msvalidate.01" content="YOUR_BING_SITE_VERIFICATION_CODE" /> <!-- Replace with your Bing Webmaster verification code -->
    <link rel="alternate" type="application/rss+xml" title="Whispers Feed" href="https://whisprs.fun/feed" />

    <!-- Open Graph tags for social media sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Whispers - Anonymous Chat App for Secure Conversations" />
    <meta
      property="og:description"
      content="Join Whispers for secure, anonymous chats. Share thoughts, connect with others, and engage in candid discussions without revealing your identity. Start now!"
    />
    <meta property="og:image" content="https://whisprs.fun/assets/og-image.jpg" />
    <meta property="og:image:alt" content="Whispers app interface for anonymous chats" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://whisprs.fun/" />
    <meta property="og:site_name" content="Whispers" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card for Twitter sharing -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Whispers - Anonymous Chat App for Secure Conversations" />
    <meta
      name="twitter:description"
      content="Join Whispers for secure, anonymous chats. Share thoughts, connect with others, and engage in candid discussions without revealing your identity. Start now!"
    />
    <meta name="twitter:image" content="https://whisprs.fun/assets/og-image.jpg" />
    <meta name="twitter:image:alt" content="Whispers app interface for anonymous chats" />

    <!-- Structured Data (Schema.org) for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Whispers",
        "url": "https://whisprs.fun/",
        "description": "Anonymous chat platform for secure, candid conversations.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://whisprs.fun/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Whispers App",
        "applicationCategory": "SocialNetworkingApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "reviewCount": "1500"
        }
      }
    </script>

    <title>Whispers - Anonymous Chat App for Secure Conversations</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
